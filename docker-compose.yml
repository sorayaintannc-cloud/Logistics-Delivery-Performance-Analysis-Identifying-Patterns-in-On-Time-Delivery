version: '3.4'

x-common:
  &common
  image: apache/airflow:2.3.4  # image airflow
  user: "${AIRFLOW_UID}:0"     # user permission
  env_file:
    - .env                     # load env
  environment:
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres_m3:5432/airflow  # connect DB
  volumes:
    - ./dags:/opt/airflow/dags      # DAG folder
    - ./logs:/opt/airflow/logs      # logs
    - ./plugins:/opt/airflow/plugins# plugins
    - /var/run/docker.sock:/var/run/docker.sock  # docker access

x-depends-on:
  &depends-on
  depends_on:
    postgres_m3:
      condition: service_healthy    # tunggu postgres ready
    airflow-init-m3:
      condition: service_completed_successfully  # tunggu init selesai

services:
  postgres_m3:
    image: postgres:13              # database
    container_name: postgres_m3
    ports:
      - "5434:5432"                # expose postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "airflow"]
      interval: 5s
      retries: 5

  airflow-scheduler-m3:
    <<: [*common, *depends-on]
    container_name: airflow-scheduler-m3
    command: scheduler             # scheduler airflow
    restart: on-failure
    ports:
      - "8794:8793"

  airflow-webserver-m3:
    <<: [*common, *depends-on]
    container_name: airflow-webserver-m3
    restart: always
    command: webserver             # UI airflow
    ports:
      - "8081:8080"                # 8081localhost/8080port container

  airflow-init-m3:
    <<: *common
    container_name: airflow-init-m3
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db init            
        airflow users create \     
          --username airflow \
          --firstname airflow \
          --lastname airflow \
          --role Admin \
          --email airflow@example.com \
          --password airflow || true

  elasticsearch_m3:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.15.0  # elasticsearch
    container_name: elasticsearch_m3
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m  # memory limit
    ports:
      - "9201:9200"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data  # persist data

  kibana_m3:
    image: docker.elastic.co/kibana/kibana:7.15.0  # kibana UI
    container_name: kibana_m3
    depends_on:
      - elasticsearch_m3
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch_m3:9200
    ports:
      - "5602:5601"

volumes:
  elasticsearch-data:  # volume ES